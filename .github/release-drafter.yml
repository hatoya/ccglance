# tag-template must never match a real tag: with immutable releases enabled,
# pushing a tag auto-publishes a draft release that names that tag, freezing
# it asset-less before release.yml can run. The placeholder deliberately does
# not start with "v" so it can never hit release.yml's v* trigger either;
# release.yml only inherits the draft's notes and never creates this tag.
name-template: 'v$RESOLVED_VERSION'
tag-template: 'notes-placeholder-v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    label: 'feature'
  - title: '🐛 Bug Fixes'
    label: 'bug'
  - title: '🧰 Maintenance'
    label: 'chore'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
version-resolver:
  minor:
    labels:
      - 'feature'
  patch:
    labels:
      - 'bug'
      - 'chore'
  default: patch
autolabeler:
  - label: feature
    branch:
      - '/^feature[/-].+/'
  - label: bug
    branch:
      - '/^(bug|bugfix|hotfix|fix)[/-].+/'
  - label: chore
    branch:
      - '/^chore[/-].+/'
template: |
  $CHANGES
