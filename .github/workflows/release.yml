# Builds ccglance.app on a macOS runner when a v* tag is pushed and publishes
# the GitHub release with ccglance.zip + ccglance.zip.sha256 attached.
# Both assets are required by the in-app auto-updater (UpdateChecker).
# Releases are immutable — assets cannot be added after publishing — so the
# workflow creates a draft, attaches the assets, then publishes it.
# Can also be run manually (workflow_dispatch) against an existing tag.
name: Release assets

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and release (e.g. v1.1.1)"
        required: true

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: macos-14
    # Generous: a brand-new Apple Developer account's first notarization can
    # be held for extended review.
    timeout-minutes: 60
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
      # The `secrets` context is not allowed in step `if:` conditions, so
      # collapse the presence checks into env flags here (env is allowed).
      HAS_SIGNING_CERT: ${{ secrets.MACOS_CERTIFICATE_P12 != '' }}
      HAS_NOTARY_KEY: ${{ secrets.APPLE_API_KEY_P8 != '' }}
      HAS_TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      # The tag is the source of truth: sync build.sh's VERSION to it so the
      # app's Info.plist always matches the release even if the bump was missed.
      - name: Sync VERSION with tag
        run: |
          VERSION="${TAG#v}"
          sed -i '' "s/^VERSION=\"[^\"]*\"/VERSION=\"$VERSION\"/" build.sh
          grep '^VERSION=' build.sh

      # Signing/notarization is opt-in: when the secrets below are unset the
      # steps are skipped and the build falls back to ad-hoc signing exactly
      # as before. Setup guide: docs/NOTARIZATION.md
      - name: Import signing certificate
        if: ${{ env.HAS_SIGNING_CERT == 'true' }}
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/ccglance-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # Don't auto-lock while notarytool --wait is running
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          printf '%s' "$MACOS_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          rm -f "$RUNNER_TEMP/certificate.p12"
          # Without this codesign hangs on a GUI keychain prompt in CI
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # A new keychain is not searchable until added to the search list
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | grep -o '"Developer ID Application: [^"]*"' | head -n 1 | tr -d '"')
          if [ -z "$IDENTITY" ]; then
            echo "No Developer ID Application identity found in MACOS_CERTIFICATE_P12" >&2
            exit 1
          fi
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "SIGNING_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      # notarytool needs the .p8 as a file; only the path goes into GITHUB_ENV.
      - name: Prepare notarization API key
        if: ${{ env.HAS_NOTARY_KEY == 'true' }}
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          printf '%s' "$APPLE_API_KEY_P8" > "$RUNNER_TEMP/AuthKey.p8"
          echo "NOTARY_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"

      # bash (not ./build.sh): the exec bit can be lost when files are
      # committed via the GitHub API / web UI.
      - name: Build
        env:
          NOTARY_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          NOTARY_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: bash build.sh

      # Immutable releases forbid adding assets after publishing (and a
      # published tag can never be reused), so create a draft, attach the
      # assets, then publish. Release notes are auto-generated from merged
      # PRs, categorized by label via .github/release.yml.
      - name: Create release with assets and publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          VIEW=$(gh release view "$TAG" --json isDraft --jq .isDraft 2>&1)
          RC=$?
          set -e
          if [ $RC -eq 0 ]; then
            STATE="$VIEW"
          elif grep -qi "release not found" <<<"$VIEW"; then
            STATE=missing
          else
            echo "$VIEW" >&2
            exit 1
          fi
          if [ "$STATE" = "false" ]; then
            echo "::error::Release $TAG is already published and immutable — cut a new tag instead."
            exit 1
          fi
          if [ "$STATE" = "missing" ]; then
            gh release create "$TAG" --draft --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" build/ccglance.zip build/ccglance.zip.sha256 --clobber
          gh release edit "$TAG" --draft=false --latest

      # Keeps the Homebrew tap cask (hatoya/homebrew-tap) in sync with the
      # release. Opt-in like signing: skipped until TAP_GITHUB_TOKEN — a
      # fine-grained PAT with Contents read/write on the tap repo — is set.
      # Setup guide: docs/HOMEBREW.md
      - name: Update Homebrew tap
        if: ${{ env.HAS_TAP_TOKEN == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${TAG#v}"
          SHA256=$(cut -d' ' -f1 build/ccglance.zip.sha256)
          gh auth setup-git
          git clone --depth 1 https://github.com/hatoya/homebrew-tap.git "$RUNNER_TEMP/homebrew-tap"
          CASK="$RUNNER_TEMP/homebrew-tap/Casks/ccglance.rb"
          sed -i '' \
            -e "s/^  version \".*\"/  version \"$VERSION\"/" \
            -e "s/^  sha256 \".*\"/  sha256 \"$SHA256\"/" \
            "$CASK"
          # Fail loudly if the cask's line format drifted and sed matched
          # nothing — otherwise the "already up to date" branch would hide it.
          if ! grep -q "^  version \"$VERSION\"" "$CASK" || ! grep -q "^  sha256 \"$SHA256\"" "$CASK"; then
            echo "Cask update failed: version/sha256 lines not found in $CASK" >&2
            exit 1
          fi
          cd "$RUNNER_TEMP/homebrew-tap"
          if git diff --quiet; then
            echo "Cask already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "ccglance $VERSION"
          git push

      - name: Clean up signing material
        if: always()
        run: |
          if [ -n "${SIGNING_KEYCHAIN:-}" ]; then
            security delete-keychain "$SIGNING_KEYCHAIN" || true
          fi
          rm -f "$RUNNER_TEMP/AuthKey.p8" "$RUNNER_TEMP/certificate.p12"
