# Maintains a draft release whose notes are built from merged PR titles,
# categorized by label (.github/release-drafter.yml). The autolabeler labels
# PRs from their branch names. Pushing a v* tag triggers release.yml, which
# publishes the release with this draft's notes and deletes the draft
# (do not publish the draft by hand — an immutable release cannot get
# assets after publishing).
name: Drafter

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  ReleaseDrafter:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
