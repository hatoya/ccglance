# Maintains a draft release whose notes are built from merged PR titles,
# categorized by label (.github/release-drafter.yml). The autolabeler labels
# PRs from their branch names. Publishing the draft triggers release.yml,
# which builds and attaches the app assets.
name: Drafter

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  ReleaseDrafter:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
